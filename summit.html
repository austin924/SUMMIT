<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMMIT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050508; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Share Tech Mono', monospace; color: #aaa; overflow: hidden; }
  #wrapper { position: relative; width: 800px; max-width: 100vw; }
  canvas { display: block; width: 100%; height: 480px; background: #050508; border: 0.5px solid #1a1a2a; }
  #ui {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    background: #07070e;
    border: 0.5px solid #1a1a2a;
    border-top: none;
    gap: 16px;
  }
  .bar-group { display: flex; flex-direction: column; gap: 3px; min-width: 90px; }
  .bar-label { font-size: 9px; letter-spacing: 2px; color: #444; }
  .bar-track { height: 4px; background: #111; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  #hpFill { background: #8b1a1a; }
  #stFill { background: #1a4a8b; }
  #wmFill { background: #8b4a1a; }
  #spFill { background: #4a6a3a; }
  #alt { text-align: center; }
  #altNum { font-size: 20px; color: #ccc; letter-spacing: 2px; }
  #altLabel { font-size: 9px; color: #333; letter-spacing: 3px; }
  #hint { font-size: 9px; color: #282830; text-align: center; letter-spacing: 2px; padding: 4px; background: #04040a; border: 0.5px solid #111; border-top: none; }
  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(3,3,8,0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    z-index: 10;
  }
  #overlay h1 {
    font-family: 'Cinzel', serif; font-size: 48px; font-weight: 700;
    color: #bbb; letter-spacing: 12px;
    text-shadow: 0 0 40px rgba(100,100,160,0.4);
  }
  #overlay .sub { font-size: 11px; color: #3a3a4a; letter-spacing: 3px; text-align: center; line-height: 2; }
  #overlay button {
    margin-top: 12px; padding: 10px 36px;
    background: transparent; border: 0.5px solid #333; color: #888;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    letter-spacing: 4px; cursor: pointer; transition: all 0.3s;
  }
  #overlay button:hover { border-color: #888; color: #ccc; background: rgba(255,255,255,0.03); }
  #floatMsg {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #666; letter-spacing: 2px;
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
    white-space: nowrap; z-index: 5;
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="floatMsg"></div>
  <div id="overlay">
    <h1>SUMMIT</h1>
    <div class="sub">ALTITUDE: 8,848M &nbsp;|&nbsp; TEMPERATURE: -40°C<br>YOU ARE THE LAST ONE ALIVE</div>
    <button onclick="startGame()">BEGIN ASCENT</button>
  </div>
</div>
<div id="ui">
  <div class="bar-group"><div class="bar-label">HEALTH</div><div class="bar-track"><div class="bar-fill" id="hpFill" style="width:100%"></div></div></div>
  <div class="bar-group"><div class="bar-label">STAMINA</div><div class="bar-track"><div class="bar-fill" id="stFill" style="width:100%"></div></div></div>
  <div id="alt"><div id="altNum">0m</div><div id="altLabel">ALTITUDE</div></div>
  <div class="bar-group"><div class="bar-label">WARMTH</div><div class="bar-track"><div class="bar-fill" id="wmFill" style="width:100%"></div></div></div>
  <div class="bar-group"><div class="bar-label">SUPPLIES</div><div class="bar-track"><div class="bar-fill" id="spFill" style="width:100%"></div></div></div>
</div>
<div id="hint">↑ / W / SPACE — JUMP &nbsp;&nbsp; ← → / A D — MOVE &nbsp;&nbsp; E — PICK UP SUPPLIES</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const floatMsg = document.getElementById('floatMsg');

let W, H;
function resize() {
  W = canvas.offsetWidth; H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

const MAX_ALT = 8848;
const GRAVITY = 0.38;
let keys = {};
let game = null;
let msgTimer = null;

function showMsg(txt, dur = 2500) {
  floatMsg.textContent = txt;
  floatMsg.style.opacity = '1';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => floatMsg.style.opacity = '0', dur);
}

function startGame() {
  overlay.style.display = 'none';
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => keys[e.code] = false);
  game = new Game();
  requestAnimationFrame(loop);
}

function loop() {
  if (!game) return;
  game.update();
  game.draw();
  requestAnimationFrame(loop);
}

class Game {
  constructor() {
    this.WW = 7000; this.WH = 4500;
    this.time = 0;
    this.blizzard = 0;
    this.dead = false; this.won = false;
    this.p = { x:180, y:2800, vx:0, vy:0, w:14, h:22, onGround:false, facing:1,
               hp:100, st:100, wm:100, sp:100, alt:0 };
    this.camX = 0; this.camY = 0;
    this.terrain = this.genTerrain();
    this.entities = this.genEntities();
    this.items = this.genItems();
    this.snow = Array.from({length:120}, () => this.makeSnow());
    this.placed = false;
  }

  makeSnow() {
    return { x: Math.random()*this.WW, y: Math.random()*this.WH,
             r: 0.5+Math.random()*1.8, s: 0.4+Math.random()*1.2, d: (Math.random()-0.5)*0.4 };
  }

  genTerrain() {
    const segs = [];
    let x=0, y=this.WH-180;
    while (x < this.WW-100) {
      const w = 70+Math.random()*90;
      const dh = (Math.random()<0.65 ? -1 : 1) * (8+Math.random()*35);
      segs.push({ x, y, w, h:28 });
      y = Math.max(160, Math.min(this.WH-120, y+dh));
      x += w + (Math.random()*20);
      if (x > this.WW*0.8) y = Math.max(120, y-50);
    }
    segs.push({ x:this.WW-140, y:110, w:200, h:28, summit:true });
    return segs;
  }

  genEntities() {
    return Array.from({length:7}, (_,i) => ({
      x: 500+i*420+Math.random()*150, y:0, vx:0.6+Math.random()*0.4,
      w:16, h:24, alive:true, base:500+i*420, range:100,
      frame:Math.random()
    }));
  }

  genItems() {
    const types = ['food','flare','rope','food','flare','rope','food','flare','rope','rope','food','flare'];
    return types.map((t,i) => ({
      x: 280+i*260+Math.random()*80, y:0, w:10, h:10,
      type:t, collected:false, bob:Math.random()*Math.PI*2
    }));
  }

  placeOnGround() {
    if (this.placed) return; this.placed = true;
    const getY = (x) => {
      for (const s of this.terrain) if (x>=s.x && x<=s.x+s.w) return s.y;
      return this.WH-200;
    };
    for (const e of this.entities) e.y = getY(e.x) - e.h;
    for (const it of this.items) it.y = getY(it.x) - it.h - 6;
  }

  update() {
    if (this.dead || this.won) return;
    this.placeOnGround();
    this.time++;
    const p = this.p;

    this.blizzard = Math.min(1, (p.alt/MAX_ALT)*1.5);

    const spd = 2.4;
    if (keys['ArrowLeft']||keys['KeyA']) { p.vx=-spd; p.facing=-1; }
    else if (keys['ArrowRight']||keys['KeyD']) { p.vx=spd; p.facing=1; }
    else p.vx *= 0.65;

    if ((keys['ArrowUp']||keys['KeyW']||keys['Space']) && p.onGround) {
      p.vy = -8.5; p.onGround = false;
    }

    p.vy += GRAVITY;
    p.x += p.vx; p.y += p.vy;

    p.onGround = false;
    for (const s of this.terrain) {
      if (p.x+p.w > s.x && p.x < s.x+s.w) {
        if (p.y+p.h >= s.y-2 && p.y+p.h <= s.y+16 && p.vy >= 0) {
          p.y = s.y - p.h; p.vy = 0; p.onGround = true;
          if (s.summit && !this.won) { this.won = true; this.showWin(); }
        }
      }
    }

    if (p.y > this.WH+60) { p.y=this.WH-300; p.hp-=25; showMsg('You fell. -25 health'); }
    p.x = Math.max(0, Math.min(this.WW-p.w, p.x));

    p.alt = Math.max(0, Math.min(MAX_ALT, Math.round(MAX_ALT*(1-p.y/this.WH))));

    if (this.time % 80 === 0) {
      p.wm -= 1.2 + this.blizzard*3;
      p.st -= 0.4 + (p.alt/MAX_ALT)*2;
      p.sp -= 0.25;
    }
    if (p.wm <= 0) { p.hp -= 0.5; p.wm = 0; }
    if (p.st < 0) p.st = 0;
    if (p.sp < 0) p.sp = 0;
    p.wm = Math.min(100, p.wm); p.st = Math.min(100, p.st);

    for (const e of this.entities) {
      if (!e.alive) continue;
      e.frame = (e.frame+0.04)%1;
      e.x += e.vx;
      if (e.x > e.base+e.range) e.vx = -Math.abs(e.vx);
      if (e.x < e.base-e.range) e.vx = Math.abs(e.vx);
      let gy = this.WH-200;
      for (const s of this.terrain) if (e.x>=s.x && e.x<=s.x+s.w) { gy=s.y; break; }
      e.y = gy - e.h;
      if (Math.abs(e.x-p.x)<22 && Math.abs(e.y-p.y)<30) {
        p.hp -= 0.6;
        if (this.time%100===0) showMsg('Something feeds on your warmth...');
      }
    }

    if (keys['KeyE']) {
      for (const it of this.items) {
        if (!it.collected && Math.abs(it.x-p.x)<32 && Math.abs(it.y-p.y)<40) {
          it.collected = true;
          if (it.type==='food') { p.hp=Math.min(100,p.hp+22); showMsg('Rations found. +22 health'); }
          else if (it.type==='flare') { p.wm=Math.min(100,p.wm+32); showMsg('Flare ignited. +32 warmth'); }
          else { p.st=Math.min(100,p.st+28); showMsg('Rope secured. +28 stamina'); }
        }
      }
    }

    for (const sp of this.snow) {
      sp.x += sp.d + this.blizzard*2.5;
      sp.y += sp.s;
      if (sp.y > this.WH) sp.y = 0;
      if (sp.x > this.WW) sp.x = 0;
    }

    this.camX = p.x - W/2;
    this.camY = p.y - H*0.52;
    this.camX = Math.max(0, Math.min(this.WW-W, this.camX));
    this.camY = Math.max(0, Math.min(this.WH-H, this.camY));

    if (p.hp <= 0) { p.hp=0; this.dead=true; setTimeout(()=>this.showDeath(),600); }

    // update ui
    document.getElementById('hpFill').style.width = p.hp+'%';
    document.getElementById('stFill').style.width = p.st+'%';
    document.getElementById('wmFill').style.width = p.wm+'%';
    document.getElementById('spFill').style.width = p.sp+'%';
    document.getElementById('altNum').textContent = p.alt.toLocaleString()+'m';
  }

  draw() {
    ctx.clearRect(0,0,W,H);

    // sky
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#03030a');
    sky.addColorStop(1,'#0a0a18');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.translate(-this.camX, -this.camY);

    this.drawBgMountains();
    this.drawTerrain();
    this.drawItems();
    this.drawEntities();
    this.drawPlayer();
    this.drawSnow();

    ctx.restore();

    this.drawFog();
    this.drawVignette();
  }

  drawBgMountains() {
    // Layer 3 - far
    ctx.fillStyle = '#080812';
    ctx.beginPath(); ctx.moveTo(0,this.WH);
    for (let x=0; x<this.WW; x+=180) {
      const h = 400+Math.sin(x*0.003)*200+Math.cos(x*0.007)*150;
      ctx.lineTo(x, this.WH-h);
    }
    ctx.lineTo(this.WW,this.WH); ctx.closePath(); ctx.fill();

    // Layer 2
    ctx.fillStyle = '#0c0c1e';
    ctx.beginPath(); ctx.moveTo(0,this.WH);
    for (let x=0; x<this.WW; x+=120) {
      const h = 250+Math.sin(x*0.005+1)*180+Math.cos(x*0.009)*120;
      ctx.lineTo(x, this.WH-h);
    }
    ctx.lineTo(this.WW,this.WH); ctx.closePath(); ctx.fill();

    // Layer 1 - near
    ctx.fillStyle = '#101020';
    ctx.beginPath(); ctx.moveTo(0,this.WH);
    for (let x=0; x<this.WW; x+=80) {
      const h = 150+Math.sin(x*0.008+2)*100+Math.cos(x*0.013)*80;
      ctx.lineTo(x, this.WH-h);
    }
    ctx.lineTo(this.WW,this.WH); ctx.closePath(); ctx.fill();
  }

  drawTerrain() {
    for (const s of this.terrain) {
      if (s.summit) {
        ctx.fillStyle = '#e8e8f8';
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(s.x, s.y, s.w, 3);
        // glow
        ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(200,200,255,0.5)';
        ctx.fillStyle = 'rgba(255,230,100,0.9)';
        ctx.beginPath(); ctx.arc(s.x+s.w/2, s.y-16, 5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffdd66';
        ctx.font = '10px "Share Tech Mono"';
        ctx.textAlign = 'center';
        ctx.fillText('SUMMIT', s.x+s.w/2, s.y-28);
      } else {
        // rock face
        const g = ctx.createLinearGradient(0,s.y,0,s.y+s.h);
        g.addColorStop(0,'#252535'); g.addColorStop(1,'#111118');
        ctx.fillStyle = g;
        ctx.fillRect(s.x, s.y, s.w, s.h);
        // snow cap on top
        ctx.fillStyle = 'rgba(200,210,240,0.12)';
        ctx.fillRect(s.x, s.y, s.w, 4);
        // edge
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(s.x, s.y, 2, s.h);
        ctx.fillRect(s.x+s.w-2, s.y, 2, s.h);
      }
    }
  }

  drawPlayer() {
    const p = this.p;
    const bob = p.onGround ? Math.sin(this.time*0.12)*1.2 : 0;
    ctx.save();
    ctx.translate(p.x+p.w/2, p.y+p.h/2+bob);
    ctx.scale(p.facing, 1);

    // legs
    ctx.fillStyle = '#1a1a2c';
    const legOff = p.onGround ? Math.sin(this.time*0.18)*3 : 0;
    ctx.fillRect(-3, p.h/2-10, 5, 12+legOff);
    ctx.fillRect(1, p.h/2-10, 5, 12-legOff);

    // body / parka
    ctx.fillStyle = '#2a2a40';
    ctx.fillRect(-p.w/2, -p.h/2+8, p.w, p.h-12);
    // hood
    ctx.fillStyle = '#3a3a50';
    ctx.fillRect(-p.w/2, -p.h/2+8, p.w, 9);

    // head
    ctx.fillStyle = '#8a6a50';
    ctx.beginPath(); ctx.arc(0, -p.h/2+5, 5, 0, Math.PI*2); ctx.fill();
    // goggles
    ctx.fillStyle = '#1a3a5a';
    ctx.fillRect(-4, -p.h/2+3, 8, 3);

    // arms
    ctx.fillStyle = '#2a2a40';
    ctx.fillRect(-p.w/2-4, -p.h/2+10, 4, 10);
    ctx.fillRect(p.w/2, -p.h/2+10, 4, 10);

    // cold breath
    if (this.blizzard > 0.3) {
      ctx.fillStyle = `rgba(200,220,255,${this.blizzard*0.25})`;
      ctx.beginPath(); ctx.arc(p.w/2+6, -p.h/2+5, 3+Math.sin(this.time*0.1)*2, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  }

  drawEntities() {
    for (const e of this.entities) {
      if (!e.alive) continue;
      const pulse = 0.5+Math.sin(this.time*0.06+e.base*0.01)*0.3;
      const float = Math.sin(this.time*0.04+e.base)*4;
      ctx.save();
      ctx.translate(e.x+e.w/2, e.y+e.h/2+float);
      ctx.globalAlpha = pulse;

      // aura
      const aura = ctx.createRadialGradient(0,0,2,0,0,e.w+8);
      aura.addColorStop(0,'rgba(80,0,120,0.6)');
      aura.addColorStop(1,'rgba(80,0,120,0)');
      ctx.fillStyle = aura;
      ctx.beginPath(); ctx.ellipse(0,0,e.w+8,e.h+8,0,0,Math.PI*2); ctx.fill();

      // body
      ctx.fillStyle = '#0d0015';
      ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);

      // eyes
      ctx.fillStyle = 'rgba(200,80,255,0.9)';
      ctx.beginPath(); ctx.arc(-4,-e.h/2+7,2.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4,-e.h/2+7,2.5,0,Math.PI*2); ctx.fill();

      // tendrils
      ctx.strokeStyle = 'rgba(120,0,180,0.5)';
      ctx.lineWidth = 1;
      for (let i=0; i<3; i++) {
        ctx.beginPath();
        ctx.moveTo(-4+i*4, e.h/2);
        ctx.quadraticCurveTo(-4+i*4+Math.sin(this.time*0.08+i)*6, e.h/2+8, -4+i*4+Math.sin(this.time*0.06+i)*4, e.h/2+16);
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  drawItems() {
    for (const it of this.items) {
      if (it.collected) continue;
      it.bob = (it.bob + 0.05) % (Math.PI*2);
      const bobY = Math.sin(it.bob)*3;
      ctx.save();
      ctx.translate(it.x+it.w/2, it.y+it.h/2+bobY);
      const glow = 0.6+Math.sin(it.bob)*0.4;
      ctx.globalAlpha = glow;

      let color, glowColor;
      if (it.type==='food') { color='#2a6a2a'; glowColor='rgba(40,120,40,0.3)'; }
      else if (it.type==='flare') { color='#8a3a10'; glowColor='rgba(180,80,20,0.3)'; }
      else { color='#1a3a7a'; glowColor='rgba(30,70,160,0.3)'; }

      const g = ctx.createRadialGradient(0,0,0,0,0,10);
      g.addColorStop(0,glowColor); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();

      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(-2,-2,2,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  drawSnow() {
    ctx.fillStyle = 'rgba(210,220,255,0.55)';
    for (const sp of this.snow) {
      ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2); ctx.fill();
    }
  }

  drawFog() {
    const a = 0.15+this.blizzard*0.55;
    const fog = ctx.createLinearGradient(0,0,0,H);
    fog.addColorStop(0,`rgba(4,4,14,${a})`);
    fog.addColorStop(0.4,`rgba(4,4,14,${a*0.25})`);
    fog.addColorStop(1,'rgba(4,4,14,0.05)');
    ctx.fillStyle=fog; ctx.fillRect(0,0,W,H);

    if (this.blizzard > 0.5) {
      const lines = ctx.createLinearGradient(0,0,W,H);
      lines.addColorStop(0,`rgba(180,190,230,${(this.blizzard-0.5)*0.08})`);
      lines.addColorStop(1,'transparent');
      ctx.fillStyle=lines; ctx.fillRect(0,0,W,H);
    }
  }

  drawVignette() {
    const v = ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.85);
    v.addColorStop(0,'transparent');
    v.addColorStop(1,'rgba(0,0,0,0.75)');
    ctx.fillStyle=v; ctx.fillRect(0,0,W,H);

    if (this.p.hp < 35) {
      const pulse = Math.sin(this.time*0.07)*0.12+0.14;
      const bl = ctx.createRadialGradient(W/2,H/2,H*0.08,W/2,H/2,H*0.7);
      bl.addColorStop(0,'transparent');
      bl.addColorStop(1,`rgba(100,0,0,${pulse})`);
      ctx.fillStyle=bl; ctx.fillRect(0,0,W,H);
    }
    if (this.p.wm < 25) {
      const pulse2 = Math.sin(this.time*0.05)*0.08+0.1;
      const cold = ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.8);
      cold.addColorStop(0,'transparent');
      cold.addColorStop(1,`rgba(30,60,120,${pulse2})`);
      ctx.fillStyle=cold; ctx.fillRect(0,0,W,H);
    }
  }

  showDeath() {
    overlay.innerHTML = `
      <h1 style="color:#6a1515;letter-spacing:12px">PERISHED</h1>
      <div class="sub" style="color:#4a2020">The mountain claimed another soul.<br>Altitude reached: ${this.p.alt.toLocaleString()}m of ${MAX_ALT.toLocaleString()}m</div>
      <button onclick="location.reload()">TRY AGAIN</button>
    `;
    overlay.style.display = 'flex';
  }

  showWin() {
    overlay.innerHTML = `
      <h1 style="color:#ccbb66;letter-spacing:12px">SUMMIT</h1>
